version: 1
issue_types:
  - bug
  - enhancement
  - chore
  - question
severity_levels:
  - critical
  - high
  - medium
  - low

classification_rules:
  - id: runtime_crash
    match_any:
      - crash
      - exception
      - traceback
      - segfault
      - fatal
      - panic
      - oom
      - out of memory
    type: bug
    severity: high
    component: runtime
    labels:
      - bug
      - area:runtime

  - id: test_failure
    match_any:
      - test failed
      - assertionerror
      - failed tests
      - pytest failed
      - ci failed
    type: bug
    severity: medium
    component: qa
    labels:
      - bug
      - area:qa

  - id: performance_regression
    match_any:
      - regression
      - slower
      - latency
      - memory pressure
      - cpu spike
      - leak
    type: bug
    severity: medium
    component: performance
    labels:
      - bug
      - area:performance

  - id: security_issue
    match_any:
      - vulnerability
      - cve
      - exploit
      - injection
      - auth bypass
    type: bug
    severity: critical
    component: security
    labels:
      - bug
      - area:security
      - priority:critical

  - id: feature_request
    match_any:
      - feature request
      - add support
      - implement
      - would like
      - can we add
      - new capability
    type: enhancement
    severity: medium
    component: product
    labels:
      - enhancement

  - id: maintenance_task
    match_any:
      - refactor
      - cleanup
      - chore
      - technical debt
      - housekeeping
    type: chore
    severity: low
    component: maintenance
    labels:
      - chore

defaults:
  type: question
  severity: low
  component: general
  labels:
    - triage

duplicate_policy:
  fuzzy_title_threshold: 0.86
  require_fingerprint_for_exact: false
  prefer_open_over_closed: true
