version: 1
allowlist_extensions:
  - .md
  - .py
  - .sh
  - .zsh
  - .json
  - .yaml
  - .yml
  - .toml
allowlist_filenames:
  - SKILL.md
  - manifest.json
  - manifest.v2.json
skip_path_parts:
  - _p0_backups
  - .backups
  - _generated
  - __pycache__
  - .pytest_cache
exclude_file_globs:
  - skill-portability-guardian/references/portability_rules.yaml
  - skill-portability-guardian/reports/*

autofix_rules:
  - id: replace_path_bound_skill_reference
    description: Replace path-bound skill references with skill-id references.
    regex: '@\[\.agent/skills/([A-Za-z0-9._-]+)\]'
    replacement: '$\1'
    file_globs: ["SKILL.md", "*.md"]

  - id: replace_absolute_python_codex_skill_path
    description: Replace absolute Codex skill script invocations with CODEX_HOME-aware path.
    regex: 'python3\s+/Users/[^/\s]+/\.codex/skills/([^\s`"]+)'
    replacement: 'python3 ${CODEX_HOME:-~/.codex}/skills/\1'
    file_globs: ["*.md", "*.sh", "*.zsh"]

  - id: replace_absolute_file_uri_skill_link
    description: Remove absolute file URI skill links.
    regex: 'file:///Users/[^)\s]+/skills/([^/)\s]+)/SKILL\.md'
    replacement: 'skills://\1'
    file_globs: ["*.md"]

  - id: replace_absolute_file_uri_generic
    description: Redact remaining absolute local file URIs.
    regex: 'file:///Users/[^)\s]+'
    replacement: 'file://<redacted-local-path>'
    file_globs: ["*.md"]

  - id: parameterize_openclaw_home
    description: Parameterize fixed OpenClaw home paths.
    regex: '/home/pi/\.openclaw'
    replacement: '${OPENCLAW_HOME:-~/.openclaw}'
    file_globs: ["*.md", "*.py", "*.json", "*.yaml", "*.yml", "*.toml", "*.sh", "*.zsh"]

  - id: parameterize_pi_home
    description: Replace fixed Pi home path with environment-aware placeholder.
    regex: '/home/pi'
    replacement: '${PI_HOME:-~}'
    file_globs: ["*.md", "*.py", "*.json", "*.yaml", "*.yml", "*.toml", "*.sh", "*.zsh"]

  - id: redact_absolute_user_home
    description: Redact hardcoded user homes to portable placeholder.
    regex: '/Users/(?!<you>)([A-Za-z0-9._-]+)'
    replacement: '/Users/<you>'
    file_globs: ["*.md", "*.py", "*.json", "*.yaml", "*.yml", "*.toml", "*.sh", "*.zsh"]

  - id: redact_personal_handles
    description: Remove known personal handles from active skill assets.
    regex: '\b(?:ryn|ambrosino)\b'
    replacement: 'user'
    file_globs: ["*.md", "*.py", "*.json", "*.yaml", "*.yml", "*.toml", "*.sh", "*.zsh"]

  - id: normalize_partner_names
    description: Replace named partner references with generic identifiers.
    regex: '\bRyan Dotson\b'
    replacement: 'Partner A'
    file_globs: ["*.md"]

  - id: normalize_partner_names_b
    description: Replace named partner references with generic identifiers.
    regex: '\bDwayne Keller\b'
    replacement: 'Partner B'
    file_globs: ["*.md"]

strict_violation_patterns:
  - id: strict_abs_user_path
    description: Disallow hardcoded user home paths.
    regex: '/Users/(?!<you>)([A-Za-z0-9._-]+)'

  - id: strict_personal_handle
    description: Disallow known personal handles.
    regex: '\b(?:ryn|ambrosino)\b'

  - id: strict_abs_file_uri
    description: Disallow absolute file URI paths.
    regex: 'file:///Users/'

  - id: strict_pi_home
    description: Disallow fixed Pi home path literals.
    regex: '/home/pi'
